---
name: PR Playground Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-playground-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Create or update playground preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- facturascripts-playground-preview -->';
            const imageUrl = 'https://raw.githubusercontent.com/erseco/facturascripts-playground/main/ogimage.png';
            const { owner, repo } = context.repo;
            const pullRequest = context.payload.pull_request;

            if (!pullRequest) {
              core.setFailed('This workflow only supports pull_request events.');
              return;
            }

            function toBase64Url(input) {
              return Buffer.from(input)
                .toString('base64')
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/g, '');
            }

            const headOwner = pullRequest.head.repo.owner.login;
            const headRepo = pullRequest.head.repo.name;
            const headRef = pullRequest.head.ref;
            const pluginZipUrl = `https://github.com/${headOwner}/${headRepo}/archive/refs/heads/${headRef}.zip`;
            const blueprint = {
              meta: {
                title: 'QuickCreate',
                author: headOwner,
                description: `Run QuickCreate from PR branch ${headRef} in FacturaScripts Playground`,
              },
              plugins: [pluginZipUrl],
            };
            const encodedBlueprint = toBase64Url(JSON.stringify(blueprint));
            const previewUrl = `https://erseco.github.io/facturascripts-playground/?blueprint-data=${encodedBlueprint}`;
            const body = [
              marker,
              '## FacturaScripts Playground Preview',
              '',
              `<a href="${previewUrl}">`,
              `  <img src="${imageUrl}" alt="Open this PR in FacturaScripts Playground" width="220">`,
              '</a><br>',
              `<small><a href="${previewUrl}">Try this PR in your browser</a></small>`,
              '',
              'This preview loads the plugin directly from the PR branch ZIP in FacturaScripts Playground.',
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: pullRequest.number,
                per_page: 100,
              }
            );

            const existingComment = comments.find((comment) => comment.body.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
              core.info(`Updated existing preview comment: ${existingComment.id}`);
              return;
            }

            const createdComment = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pullRequest.number,
              body,
            });

            core.info(`Created preview comment: ${createdComment.data.id}`);
